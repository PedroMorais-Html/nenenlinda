<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartas — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="card" id="card">

    <!-- tela de login -->
    <div id="tela-login">
      <p class="deco">♡ ♡ ♡</p>
      <h1 class="titulo">Bem-vind<em>os</em></h1>
      <p class="sub">só para quem tem o coração certo ✿</p>

      <div class="sep"><span></span><em>acesso privado</em><span></span></div>

      <label class="label" for="nome">Seu nome</label>
      <input class="input" id="nome" type="text" placeholder="Digite seu nome…" autocomplete="off">

      <label class="label" for="senha">Nossa data especial</label>
      <input class="input" id="senha" type="password" placeholder="a data que mudou tudo…">

      <button class="btn" id="btn-entrar">Entrar com amor ♡</button>
      <p class="erro" id="erro">Nome ou data incorretos. Tente de novo 💌</p>
      <p class="rodape">apenas para nós dois ✦</p>
    </div>

    <!-- tela de sucesso -->
    <div class="sucesso" id="tela-sucesso">
      <span class="coracao">♡</span>
      <h2>Olá, <em id="nome-ok"></em>!</h2>
      <p>Que bom ter você aqui 🌸<br>Acesso liberado com muito amor.</p>
      <button class="btn" id="btn-ir">Entrar no portfólio →</button>
    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
